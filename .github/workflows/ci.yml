name: CI

on:
  push:
    branches: [main]
    tags-ignore: ["**"]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - run: npm ci

      - run: npm run format:check

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run build

      - run: npm test

      - name: Verify Chrome
        env:
          PLAYWRIGHT_CHROME_CHANNEL: chrome
        run: |
          if ! command -v google-chrome >/dev/null 2>&1; then
            echo "::error::google-chrome is not installed on this runner; cannot run Playwright with channel=chrome"
            exit 1
          fi
          google-chrome --version
          npx playwright --version

      - run: npm run test:e2e
        env:
          PLAYWRIGHT_CHROME_CHANNEL: chrome
