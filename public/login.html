<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — webagent</title>
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'auto');</script>
<link rel="stylesheet" href="/styles.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .login-card { width: 100%; max-width: 480px; padding: 2rem 1.5rem; box-sizing: border-box; }
  .login-card h1 { font-size: 1.2rem; margin: 0 0 0.5rem; }
  .login-card p { font-size: 0.9rem; opacity: 0.75; margin: 0 0 1.25rem; line-height: 1.45; }
  .login-card textarea {
    width: 100%; box-sizing: border-box; min-height: 4.5rem;
    font-family: inherit; font-size: 0.95rem; padding: 0.6rem;
    border: 1px solid currentColor; border-radius: 4px;
    background: transparent; color: inherit; resize: vertical;
  }
  .login-card .error {
    display: none; margin-top: 0.75rem; padding: 0.5rem 0.75rem;
    border: 1px solid #c0392b; color: #c0392b; border-radius: 4px;
    font-size: 0.85rem;
  }
  .login-card button {
    margin-top: 1rem; width: 100%; padding: 0.6rem;
    font: inherit; cursor: pointer; border: 1px solid currentColor;
    background: transparent; color: inherit; border-radius: 4px;
  }
  .login-card button:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-card .hint { font-size: 0.78rem; opacity: 0.6; margin-top: 1rem; }
  .login-card code { background: rgba(127,127,127,0.15); padding: 0.1rem 0.35rem; border-radius: 3px; }
</style>
</head>
<body>
<div class="login-card">
  <h1>>_ webagent</h1>
  <p>Paste your access token to sign in. Tokens are stored on this device only.</p>
  <form id="login-form">
    <textarea id="token-input" placeholder="wat_..." autocomplete="off" spellcheck="false" autocapitalize="none"></textarea>
    <div id="error" class="error" role="alert"></div>
    <button id="submit-btn" type="submit">Sign in</button>
  </form>
  <p class="hint">Don't have a token? Run <code>webagent --create-token &lt;name&gt;</code> on the server.</p>
</div>
<script type="module" src="/js/login.js"></script>
</body>
</html>
