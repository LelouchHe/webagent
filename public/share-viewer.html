<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>shared session — >_</title>
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <meta
      name="theme-color"
      content="#0d1117"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/share-viewer.css" />
  </head>
  <body class="share-viewer">
    <div id="header">
      <div class="header-side header-left">
        <span class="logo">>_</span>
        <span class="share-badge">shared</span>
      </div>
      <span id="session-info" class="status"></span>
      <div class="header-side header-right">
        <button id="theme-btn" title="Toggle theme">◑</button>
      </div>
    </div>

    <div id="messages"></div>

    <footer id="share-footer">
      <div class="share-footer-inner">
        <span class="share-footer-note"
          >read-only snapshot · 继续往下问功能 v2 提供</span
        >
        <span class="share-footer-meta"></span>
      </div>
    </footer>
  </body>
</html>
