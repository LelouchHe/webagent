<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Web</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #6e7681;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --blue: #58a6ff;
    --radius: 4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "SF Mono", "Fira Code", "Cascadia Code", "Consolas", monospace;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    font-size: 16px;
  }

  /* Header */
  #header {
    padding: 6px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 15px;
  }
  #header .logo { font-weight: bold; color: var(--green); }
  #header .status { color: var(--text-dim); margin-left: auto; }
  #header .status.connected { color: var(--green); }
  #header .status.connecting { color: var(--yellow); }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .msg {
    padding: 8px 14px;
    line-height: 1.6;
    font-size: 16px;
    overflow-wrap: break-word;
  }
  .msg.user {
    background: #1e3a5f;
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--radius) var(--radius) 0;
    margin: 8px 0 4px 0;
    font-weight: 500;
  }
  .msg.user::before {
    content: '▶ ';
    color: var(--accent);
    font-weight: bold;
  }
  .msg.assistant {
    padding: 4px 14px;
  }
  .msg.assistant pre {
    background: #0d1117;
    padding: 10px;
    border-radius: 4px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 15px;
  }
  .msg.assistant code {
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 15px;
  }
  .msg.assistant p { margin: 4px 0; }
  .msg.assistant ul, .msg.assistant ol { padding-left: 20px; margin: 4px 0; }

  /* Thinking */
  .thinking {
    color: var(--text-dim);
    font-style: italic;
    font-size: 15px;
    padding: 6px 14px;
    border-left: 2px solid var(--border);
  }
  .thinking summary { cursor: pointer; }

  /* Tool calls */
  .tool-call {
    font-size: 15px;
    padding: 2px 14px;
    color: var(--text-dim);
  }
  .tool-call .icon { margin-right: 4px; }
  .tool-call.completed { color: var(--green); }
  .tool-call.failed { color: var(--red); }
  .tool-call details { margin-top: 2px; }
  .tool-call details summary { cursor: pointer; color: var(--text-dim); }
  .tool-call .tc-content {
    margin: 4px 0 4px 16px;
    padding: 6px 10px;
    background: #0d1117;
    border-radius: var(--radius);
    font-size: 14px;
    white-space: pre-wrap;
    max-height: 200px;
    overflow-y: auto;
    color: var(--text);
  }

  /* Plan */
  .plan {
    font-size: 15px;
    padding: 6px 14px;
    border-left: 3px solid var(--blue);
    border-radius: 0 var(--radius) var(--radius) 0;
  }
  .plan-title { color: var(--blue); font-weight: bold; margin-bottom: 2px; }
  .plan-entry { padding: 1px 0; }

  /* Permission dialog */
  .permission {
    background: #1c1305;
    border-left: 3px solid var(--yellow);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 8px 14px;
    font-size: 15px;
  }
  .permission .title { color: var(--yellow); font-weight: bold; margin-bottom: 6px; }
  .permission button {
    margin: 2px 4px 2px 0;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
  }
  .permission button:hover { background: var(--surface); }
  .permission button.allow { border-color: var(--green); }
  .permission button.deny { border-color: var(--red); }

  /* Input */
  #input-area {
    padding: 8px 16px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  #input-prompt {
    color: var(--green);
    font-weight: bold;
    user-select: none;
    line-height: 1.5;
  }
  #input {
    flex: 1;
    background: transparent;
    color: var(--text);
    border: none;
    padding: 4px 8px;
    font-size: 16px;
    font-family: inherit;
    resize: none;
    min-height: 28px;
    max-height: 200px;
    line-height: 1.5;
  }
  #input:focus { outline: none; }
  #send-btn {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 10px;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
  }
  #send-btn:hover { color: var(--text); border-color: var(--text-dim); }
  #send-btn:disabled { opacity: 0.3; cursor: default; }

  /* Image attach */
  #attach-btn {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 10px;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
  }
  #attach-btn:hover { color: var(--text); border-color: var(--text-dim); }
  #attach-btn:hover { color: var(--text); }
  #attach-preview {
    display: none;
    padding: 4px 16px;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }
  #attach-preview.active { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .attach-thumb {
    position: relative;
    display: inline-block;
  }
  .attach-thumb img {
    max-height: 60px;
    max-width: 120px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }
  .attach-thumb .remove {
    position: absolute;
    top: -4px;
    right: -4px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 16px;
    height: 16px;
    font-size: 10px;
    line-height: 16px;
    text-align: center;
    cursor: pointer;
    padding: 0;
  }
  .msg.user img.user-image {
    max-width: 200px;
    max-height: 150px;
    border-radius: 4px;
    border: 1px solid var(--border);
    display: block;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div id="header">
  <span class="logo">Agent Web</span>
  <span id="session-info" class="status"></span>
  <span id="status" class="status">disconnected</span>
</div>

<div id="messages"></div>

<div id="attach-preview"></div>
<div id="input-area">
  <span id="input-prompt">❯ </span>
  <textarea id="input" rows="1" placeholder="Message or /help" autofocus></textarea>
  <button id="attach-btn" title="Attach image">⊕</button>
  <button id="send-btn" disabled>↵</button>
  <input type="file" id="file-input" accept="image/*" multiple hidden>
</div>

<script>
const $ = (s) => document.querySelector(s);
const messagesEl = $('#messages');
const inputEl = $('#input');
const sendBtn = $('#send-btn');
const statusEl = $('#status');
const sessionInfoEl = $('#session-info');
const attachBtn = $('#attach-btn');
const fileInput = $('#file-input');
const attachPreview = $('#attach-preview');

let ws = null;
let sessionId = null;
let sessionCwd = null;
let availableModels = [];
let currentModel = null;
let currentAssistantEl = null;
let currentAssistantText = '';
let currentThinkingEl = null;
let currentThinkingText = '';
let busy = false;
let pendingImages = []; // { data: base64, mimeType, previewUrl }

// --- Markdown ---
marked.setOptions({ breaks: true, gfm: true });

function renderMd(text) {
  return marked.parse(text);
}

// --- Hash routing ---

function getHashSessionId() {
  const h = location.hash.slice(1);
  return h || null;
}

function setHashSessionId(id) {
  history.replaceState(null, '', `#${id}`);
}

function updateSessionInfo(id) {
  sessionInfoEl.textContent = id ? id.slice(0, 8) + '…' : '';
}

// --- History replay ---

async function loadHistory(sid) {
  try {
    const res = await fetch(`/api/sessions/${sid}/events`);
    if (!res.ok) return false;
    const events = await res.json();
    for (const ev of events) {
      const data = JSON.parse(ev.data);
      replayEvent(ev.type, data);
    }
    return true;
  } catch {
    return false;
  }
}

function replayEvent(type, data) {
  switch (type) {
    case 'user_message': {
      const el = addMessage('user', data.text);
      if (data.images) {
        for (const img of data.images) {
          const imgEl = document.createElement('img');
          imgEl.className = 'user-image';
          imgEl.src = `/data/${img.path}`;
          el.appendChild(imgEl);
        }
      }
      break;
    }
    case 'assistant_message':
      addMessage('assistant', data.text);
      break;
    case 'thinking': {
      const el = document.createElement('details');
      el.className = 'thinking';
      el.innerHTML = `<summary>⠿ thought</summary><div class="thinking-content">${escHtml(data.text)}</div>`;
      messagesEl.appendChild(el);
      break;
    }
    case 'tool_call': {
      const icons = { read: 'cat', edit: 'edit', execute: 'exec', search: 'find', delete: 'rm' };
      const icon = icons[data.kind] || 'run';
      const el = document.createElement('div');
      el.className = 'tool-call';
      el.id = `tc-${data.id}`;
      let label = `<span class="icon">${icon}</span> ${escHtml(data.title)}`;
      const ri = data.rawInput;
      if (ri && ri.command) {
        label += `\n  <span style="color:var(--text-dim)">$ ${escHtml(ri.command)}</span>`;
      } else if (ri && ri.path) {
        label += `\n  <span style="color:var(--text-dim)">${escHtml(ri.path)}</span>`;
      }
      el.innerHTML = label;
      messagesEl.appendChild(el);
      break;
    }
    case 'tool_call_update': {
      const el = document.getElementById(`tc-${data.id}`);
      if (el) {
        const statusIcon = data.status === 'completed' ? '✓' : data.status === 'failed' ? '✗' : '…';
        el.className = `tool-call ${data.status}`;
        const iconSpan = el.querySelector('.icon');
        if (iconSpan) iconSpan.textContent = statusIcon;
      }
      break;
    }
    case 'plan': {
      const el = document.createElement('div');
      el.className = 'plan';
      el.innerHTML = '<div class="plan-title">― plan</div>' +
        (data.entries || []).map(e => {
          const s = { pending: '○', in_progress: '◉', completed: '●' }[e.status] || '?';
          return `<div class="plan-entry">${s} ${escHtml(e.content)}</div>`;
        }).join('');
      messagesEl.appendChild(el);
      break;
    }
    case 'permission_request': {
      const el = document.createElement('div');
      el.className = 'permission';
      el.innerHTML = `<div class="title" style="opacity:0.5">⚿ ${escHtml(data.title)}</div>`;
      messagesEl.appendChild(el);
      break;
    }
  }
}

// --- WebSocket ---

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  statusEl.textContent = 'connecting…';
  statusEl.className = 'status connecting';
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen = async () => {
    statusEl.textContent = 'session loading…';
    statusEl.className = 'status connecting';

    const existingId = getHashSessionId();
    if (existingId) {
      // Try to restore session — load chat history + resume copilot context
      const loaded = await loadHistory(existingId);
      if (loaded) {
        scrollToBottom();
      }
      ws.send(JSON.stringify({ type: 'resume_session', sessionId: existingId }));
      return;
    }
    ws.send(JSON.stringify({ type: 'new_session' }));
  };

  ws.onclose = () => {
    statusEl.textContent = 'disconnected';
    statusEl.className = 'status';
    sendBtn.disabled = true;
    setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleEvent(msg);
  };
}

function handleEvent(msg) {
  switch (msg.type) {
    case 'connected':
      break;

    case 'session_created':
      sessionId = msg.sessionId;
      sessionCwd = msg.cwd || sessionCwd;
      if (msg.models) {
        availableModels = msg.models.availableModels || [];
        currentModel = msg.models.currentModelId || null;
      }
      setHashSessionId(sessionId);
      updateSessionInfo(sessionId);
      statusEl.textContent = 'connected';
      statusEl.className = 'status connected';
      sendBtn.disabled = false;
      if (messagesEl.children.length === 0) {
        addSystem(`Session created: ${msg.sessionId.slice(0, 8)}…`);
      }
      break;

    case 'user_message': {
      // Broadcast from another client
      if (msg.sessionId === sessionId) {
        const el = addMessage('user', msg.text);
        if (msg.images) {
          for (const img of msg.images) {
            const imgEl = document.createElement('img');
            imgEl.className = 'user-image';
            imgEl.src = `/data/${img.path}`;
            el.appendChild(imgEl);
          }
        }
      }
      break;
    }

    case 'message_chunk':
      if (!currentAssistantEl) {
        currentAssistantEl = addMessage('assistant', '');
        currentAssistantText = '';
        finishThinking();
      }
      currentAssistantText += msg.text;
      currentAssistantEl.innerHTML = renderMd(currentAssistantText);
      scrollToBottom();
      break;

    case 'thought_chunk':
      if (!currentThinkingEl) {
        currentThinkingEl = document.createElement('details');
        currentThinkingEl.className = 'thinking';
        currentThinkingEl.innerHTML = '<summary>⠿ thinking...</summary><div class="thinking-content"></div>';
        currentThinkingText = '';
        messagesEl.appendChild(currentThinkingEl);
      }
      currentThinkingText += msg.text;
      currentThinkingEl.querySelector('.thinking-content').textContent = currentThinkingText;
      scrollToBottom();
      break;

    case 'tool_call': {
      finishThinking();
      finishAssistant();
      const icons = { read: 'cat', edit: 'edit', execute: 'exec', search: 'find', delete: 'rm' };
      const icon = icons[msg.kind] || 'run';
      const el = document.createElement('div');
      el.className = 'tool-call';
      el.id = `tc-${msg.id}`;
      let label = `<span class="icon">${icon}</span> ${escHtml(msg.title)}`;
      // Show command for execute kind
      const ri = msg.rawInput;
      if (ri && ri.command) {
        label += `\n  <span style="color:var(--text-dim)">$ ${escHtml(ri.command)}</span>`;
      } else if (ri && ri.path) {
        label += `\n  <span style="color:var(--text-dim)">${escHtml(ri.path)}</span>`;
      }
      el.innerHTML = label;
      messagesEl.appendChild(el);
      scrollToBottom();
      break;
    }

    case 'tool_call_update': {
      const el = document.getElementById(`tc-${msg.id}`);
      if (el) {
        const statusIcon = msg.status === 'completed' ? '✓' : msg.status === 'failed' ? '✗' : '…';
        el.className = `tool-call ${msg.status}`;
        const iconSpan = el.querySelector('.icon');
        if (iconSpan) iconSpan.textContent = statusIcon;
        // Render tool output as collapsible content
        if (msg.content && msg.content.length && !el.querySelector('details')) {
          const text = msg.content
            .map(c => {
              if (c.type === 'terminal') return `[terminal ${c.terminalId}]`;
              if (c.content?.text) return c.content.text;
              if (Array.isArray(c.content)) return c.content.map(cc => cc.text || '').join('');
              return '';
            })
            .filter(Boolean).join('\n');
          if (text) {
            const details = document.createElement('details');
            details.innerHTML = `<summary>output</summary><div class="tc-content">${escHtml(text)}</div>`;
            el.appendChild(details);
          }
        }
      }
      scrollToBottom();
      break;
    }

    case 'plan': {
      finishThinking();
      finishAssistant();
      const el = document.createElement('div');
      el.className = 'plan';
      el.innerHTML = '<div class="plan-title">― plan</div>' +
        msg.entries.map(e => {
          const s = { pending: '○', in_progress: '◉', completed: '●' }[e.status] || '?';
          return `<div class="plan-entry">${s} ${escHtml(e.content)}</div>`;
        }).join('');
      messagesEl.appendChild(el);
      scrollToBottom();
      break;
    }

    case 'permission_request': {
      finishThinking();
      const permEl = document.createElement('div');
      permEl.className = 'permission';
      permEl.innerHTML = `<span class="title">⚿ ${escHtml(msg.title)}</span> `;
      msg.options.forEach(opt => {
        const btn = document.createElement('button');
        const isAllow = (opt.kind || '').includes('allow');
        btn.className = isAllow ? 'allow' : 'deny';
        btn.textContent = opt.name;
        btn.onclick = () => {
          const isDeny = (opt.kind || '').includes('reject') || (opt.kind || '').includes('deny');
          ws.send(JSON.stringify({
            type: 'permission_response',
            requestId: msg.requestId,
            optionId: opt.optionId,
            denied: isDeny,
          }));
          permEl.innerHTML = `<span style="opacity:0.5">⚿ ${escHtml(msg.title)} — ${escHtml(opt.name)}</span>`;
        };
        permEl.appendChild(btn);
      });
      messagesEl.appendChild(permEl);
      scrollToBottom();
      break;
    }

    case 'prompt_done':
      finishThinking();
      finishAssistant();
      busy = false;
      sendBtn.disabled = false;
      inputEl.focus();
      break;

    case 'session_expired':
      messagesEl.innerHTML = '';
      addSystem('warn: Previous session expired, created new one.');
      ws.send(JSON.stringify({ type: 'new_session' }));
      break;

    case 'model_set':
      currentModel = msg.modelId;
      addSystem(`ok: Model: ${msg.modelId}`);
      break;

    case 'error':
      addSystem(`err: ${msg.message}`);
      busy = false;
      sendBtn.disabled = false;
      break;
  }
}

// --- Helpers ---

function addMessage(role, text) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.innerHTML = role === 'user' ? escHtml(text) : renderMd(text);
  messagesEl.appendChild(el);
  scrollToBottom();
  return el;
}

function addSystem(text) {
  const el = document.createElement('div');
  el.className = 'tool-call';
  el.textContent = text;
  messagesEl.appendChild(el);
  scrollToBottom();
}

function finishAssistant() {
  currentAssistantEl = null;
  currentAssistantText = '';
}

function finishThinking() {
  if (currentThinkingEl) {
    currentThinkingEl.querySelector('summary').textContent = '⠿ thought';
    currentThinkingEl = null;
    currentThinkingText = '';
  }
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- Slash commands ---

async function handleSlashCommand(text) {
  const parts = text.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const arg = parts.slice(1).join(' ').trim();

  switch (cmd) {
    case '/new': {
      messagesEl.innerHTML = '';
      addSystem('Creating new session…');
      const payload = { type: 'new_session' };
      if (arg) payload.cwd = arg;
      ws.send(JSON.stringify(payload));
      return true;
    }

    case '/cwd':
      addSystem(`📁 ${sessionCwd || 'unknown'}`);
      return true;

    case '/sessions': {
      try {
        const res = await fetch('/api/sessions');
        const sessions = await res.json();
        if (sessions.length === 0) {
          addSystem('No sessions.');
        } else {
          for (const s of sessions) {
            const current = s.id === sessionId ? ' ← current' : '';
            addSystem(`${s.id.slice(0, 8)}… | ${s.cwd} | ${s.created_at}${current}`);
          }
        }
      } catch {
        addSystem('err: Failed to fetch sessions');
      }
      return true;
    }

    case '/switch': {
      if (!arg) {
        addSystem('Usage: /switch <session-id-prefix>');
        return true;
      }
      try {
        const res = await fetch('/api/sessions');
        const sessions = await res.json();
        const match = sessions.find(s => s.id.startsWith(arg));
        if (!match) {
          addSystem(`err: No session matching "${arg}"`);
          return true;
        }
        messagesEl.innerHTML = '';
        await loadHistory(match.id);
        scrollToBottom();
        ws.send(JSON.stringify({ type: 'resume_session', sessionId: match.id }));
      } catch {
        addSystem('err: Failed to switch session');
      }
      return true;
    }

    case '/cancel':
      if (busy && ws) {
        ws.send(JSON.stringify({ type: 'cancel' }));
        addSystem('⏹ Cancelling…');
      } else {
        addSystem('Nothing to cancel.');
      }
      return true;

    case '/help':
      addSystem('/new [cwd] — New session');
      addSystem('/cwd — Show working directory');
      addSystem('/model [name] — Show or switch model');
      addSystem('/cancel — Cancel current response');
      addSystem('/sessions — List all sessions');
      addSystem('/switch <id> — Switch to session (prefix match)');
      addSystem('/help — Show this help');
      return true;

    case '/model': {
      if (!arg) {
        addSystem(`model: ${currentModel || 'unknown'}`);
        if (availableModels.length) {
          addSystem('Available: ' + availableModels.map(m => m.modelId).join(', '));
        }
        return true;
      }
      const match = availableModels.find(m =>
        m.modelId === arg || m.modelId.includes(arg)
      );
      if (!match) {
        addSystem(`err: Unknown model "${arg}". Try /model to see available models.`);
        return true;
      }
      ws.send(JSON.stringify({ type: 'set_model', sessionId, modelId: match.modelId }));
      addSystem(`Switching to ${match.modelId}…`);
      return true;
    }

    default:
      return false;
  }
}

// --- Image attach ---

function readFileAsBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => {
      const base64 = reader.result.split(',')[1];
      resolve({ data: base64, mimeType: file.type, previewUrl: reader.result });
    };
    reader.readAsDataURL(file);
  });
}

function addPendingImage(img) {
  pendingImages.push(img);
  renderAttachPreview();
  inputEl.focus();
}

function renderAttachPreview() {
  attachPreview.innerHTML = '';
  if (pendingImages.length === 0) {
    attachPreview.classList.remove('active');
    return;
  }
  attachPreview.classList.add('active');
  pendingImages.forEach((img, i) => {
    const thumb = document.createElement('span');
    thumb.className = 'attach-thumb';
    thumb.innerHTML = `<img src="${img.previewUrl}"><button class="remove">×</button>`;
    thumb.querySelector('.remove').onclick = () => {
      pendingImages.splice(i, 1);
      renderAttachPreview();
    };
    attachPreview.appendChild(thumb);
  });
}

attachBtn.onclick = () => fileInput.click();
fileInput.onchange = async () => {
  for (const f of fileInput.files) {
    if (f.type.startsWith('image/')) addPendingImage(await readFileAsBase64(f));
  }
  fileInput.value = '';
};

// Paste images
inputEl.addEventListener('paste', async (e) => {
  for (const item of e.clipboardData.items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      addPendingImage(await readFileAsBase64(item.getAsFile()));
    }
  }
});

// --- Input ---

function sendMessage() {
  const text = inputEl.value.trim();
  if (!text && pendingImages.length === 0) return;
  if (busy) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';

  if (text.startsWith('/') && pendingImages.length === 0) {
    handleSlashCommand(text);
    return;
  }

  if (!sessionId) {
    addSystem('warn: Session not ready yet, please wait…');
    return;
  }

  // Show user message with image thumbnails
  const msgEl = addMessage('user', text || '(image)');
  for (const img of pendingImages) {
    const imgEl = document.createElement('img');
    imgEl.className = 'user-image';
    imgEl.src = img.previewUrl;
    msgEl.appendChild(imgEl);
  }

  // Upload images to server, then send prompt
  const images = pendingImages.slice();
  pendingImages = [];
  renderAttachPreview();

  if (images.length > 0) {
    Promise.all(images.map(img =>
      fetch(`/api/images/${sessionId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: img.data, mimeType: img.mimeType }),
      }).then(r => r.json()).then(j => ({ data: img.data, mimeType: img.mimeType, path: j.path }))
    )).then(uploaded => {
      ws.send(JSON.stringify({ type: 'prompt', sessionId, text: text || 'What is in this image?', images: uploaded }));
    });
  } else {
    ws.send(JSON.stringify({ type: 'prompt', sessionId, text }));
  }
  busy = true;
  sendBtn.disabled = true;
}

sendBtn.onclick = sendMessage;
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
});

// --- Boot ---
connect();
</script>
</body>
</html>
