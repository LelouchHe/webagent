<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>>_</title>
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'auto');</script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #6e7681;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --blue: #58a6ff;
    --radius: 4px;
    --user-bg: #1e3a5f;
    --code-bg: #161b22;
    --permission-bg: #1c1305;
    --permission-title: #d29922;
  }
  [data-theme="light"] {
    --bg: #ffffff;
    --surface: #f6f8fa;
    --border: #d0d7de;
    --text: #1f2328;
    --text-dim: #656d76;
    --accent: #0969da;
    --green: #1a7f37;
    --yellow: #9a6700;
    --red: #cf222e;
    --blue: #0969da;
    --user-bg: #ddf4ff;
    --code-bg: #f6f8fa;
    --permission-bg: #fff4cc;
    --permission-title: #7a4f00;
  }
  @media (prefers-color-scheme: light) {
    [data-theme="auto"] {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --border: #d0d7de;
      --text: #1f2328;
      --text-dim: #656d76;
      --accent: #0969da;
      --green: #1a7f37;
      --yellow: #9a6700;
      --red: #cf222e;
      --blue: #0969da;
      --user-bg: #ddf4ff;
      --code-bg: #f6f8fa;
      --permission-bg: #fff4cc;
      --permission-title: #7a4f00;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "SF Mono", "Fira Code", "Cascadia Code", "Consolas", monospace;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    font-size: 16px;
  }

  /* Header */
  #header {
    padding: 6px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 15px;
  }
  #header .logo { font-weight: bold; color: var(--green); }
  #header .status { color: var(--text-dim); margin-left: auto; }
  #header .status.connected { color: var(--green); }
  #header .status.connecting { color: var(--yellow); }
  #session-info {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  #theme-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 15px;
    font-family: inherit;
    padding: 2px 6px;
  }
  #theme-btn:hover { color: var(--text); }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .msg {
    padding: 8px 14px;
    line-height: 1.6;
    font-size: 16px;
    overflow-wrap: break-word;
  }
  .msg.user {
    background: var(--user-bg);
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--radius) var(--radius) 0;
    margin: 8px 0 4px 0;
    font-weight: 500;
  }
  .msg.user::before {
    content: '▶ ';
    color: var(--accent);
    font-weight: bold;
  }
  .msg.assistant {
    padding: 4px 14px;
  }
  .msg.assistant pre {
    background: var(--code-bg);
    padding: 10px;
    border-radius: 4px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 15px;
  }
  .msg.assistant code {
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 15px;
  }
  .msg.assistant p { margin: 4px 0; }
  .msg.assistant ul, .msg.assistant ol { padding-left: 20px; margin: 4px 0; }

  /* Thinking */
  .thinking {
    color: var(--text-dim);
    font-style: italic;
    font-size: 15px;
    padding: 6px 14px;
    border-left: 2px solid var(--border);
  }
  .thinking summary { cursor: pointer; }
  .thinking-content { cursor: pointer; }
  .thinking summary.active { animation: pulse 1.5s ease-in-out infinite; }

  /* Waiting indicator (after user sends, before first response) */
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  #waiting {
    padding: 6px 14px;
    color: var(--text-dim);
    font-size: 15px;
  }
  #waiting .cursor { animation: blink 1s step-end infinite; }

  /* System messages */
  .system-msg {
    font-size: 15px;
    padding: 2px 14px;
    color: var(--text-dim);
  }

  /* Tool calls */
  .tool-call {
    font-size: 15px;
    padding: 2px 14px;
    color: var(--text-dim);
    animation: pulse 1.5s ease-in-out infinite;
  }
  .tool-call .icon { margin-right: 4px; }
  .tool-call.completed { color: var(--green); animation: none; }
  .tool-call.failed { color: var(--red); animation: none; }
  .tool-call { cursor: pointer; }
  .tool-call .tc-detail {
    display: block;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .tool-call .tc-detail.expanded {
    white-space: pre-wrap;
    overflow: visible;
    text-overflow: unset;
  }
  .tool-call details { margin-top: 2px; }
  .tool-call details summary { cursor: pointer; color: var(--text-dim); }
  .tool-call .tc-content {
    margin: 4px 0 4px 16px;
    padding: 6px 10px;
    background: var(--code-bg);
    border-radius: var(--radius);
    font-size: 14px;
    white-space: pre-wrap;
    max-height: 200px;
    overflow-y: auto;
    color: var(--text);
    cursor: pointer;
  }

  /* Diff view for edit tool calls */
  .diff-view {
    margin: 4px 0 4px 16px;
    padding: 6px 10px;
    background: var(--code-bg);
    border-radius: var(--radius);
    font-size: 13px;
    font-family: monospace;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
    line-height: 1.4;
  }
  .diff-view .diff-file { color: var(--blue); font-weight: bold; }
  .diff-view .diff-hunk { color: var(--text-dim); }
  .diff-view .diff-del { color: var(--red); }
  .diff-view .diff-add { color: var(--green); }

  /* Plan */
  .plan {
    font-size: 15px;
    padding: 6px 14px;
    border-left: 3px solid var(--blue);
    border-radius: 0 var(--radius) var(--radius) 0;
  }
  .plan-title { color: var(--blue); font-weight: bold; margin-bottom: 2px; }
  .plan-entry { padding: 1px 0; }

  /* Permission dialog */
  .permission {
    background: var(--permission-bg);
    border-left: 3px solid var(--yellow);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 8px 14px;
    font-size: 15px;
  }
  .permission .title { color: var(--permission-title); font-weight: bold; margin-bottom: 6px; }
  .permission button {
    margin: 2px 4px 2px 0;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
  }
  .permission button:hover { background: var(--surface); }
  .permission button.allow { border-color: var(--green); }
  .permission button.deny { border-color: var(--red); }

  /* Bash command output */
  .bash-block {
    margin: 2px 0;
    padding: 2px 14px;
    font-size: 15px;
  }
  .bash-block .bash-cmd {
    color: var(--green);
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
  }
  .bash-block .bash-cmd::before { content: '$ '; color: var(--text-dim); }
  .bash-block .bash-cmd.running { animation: pulse 1.5s ease-in-out infinite; }
  .bash-block .bash-output {
    margin: 4px 0 4px 0;
    padding: 6px 10px;
    background: var(--code-bg);
    border-radius: var(--radius);
    font-size: 13px;
    font-family: monospace;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 400px;
    overflow-y: auto;
    color: var(--text);
    line-height: 1.4;
    display: none;
  }
  .bash-block .bash-output.has-content { display: block; }
  .bash-block .bash-output .stderr { color: var(--red); }
  .bash-block .bash-exit { font-size: 13px; color: var(--text-dim); margin-left: 8px; }
  .bash-block .bash-exit.ok { color: var(--green); }
  .bash-block .bash-exit.fail { color: var(--red); }

  /* Input */
  #input-area {
    position: relative;
    padding: 8px 16px 20px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 4px;
    transition: border-color .15s;
  }
  #input-area.bash-mode {
    border-top-color: #e8872b;
  }
  #input-area.bash-mode #input-prompt {
    color: #e8872b;
  }
  #input-area.bash-mode #input {
    color: #e8872b;
  }
  #input-prompt {
    color: var(--green);
    font-weight: bold;
    user-select: none;
    line-height: 1.5;
  }
  #input {
    flex: 1;
    background: transparent;
    color: var(--text);
    border: none;
    padding: 4px 8px;
    font-size: 16px;
    font-family: inherit;
    resize: none;
    min-height: 28px;
    max-height: 200px;
    line-height: 1.5;
  }
  #input:focus { outline: none; }
  #send-btn {
    background: transparent;
    color: var(--text-dim);
    border: none;
    padding: 4px 8px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
  }
  #send-btn:hover { color: var(--text); }
  #send-btn.cancel { color: var(--red); font-weight: bold; }
  #send-btn.cancel:hover { color: var(--text); }
  #input-prompt.busy { color: var(--yellow); }

  /* Slash command autocomplete */
  #slash-menu {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 0;
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    max-height: 220px;
    overflow-y: auto;
    z-index: 10;
  }
  #slash-menu.active { display: block; }
  .slash-item {
    padding: 6px 14px;
    cursor: pointer;
    font-size: 15px;
    display: flex;
    gap: 12px;
  }
  .slash-item:hover, .slash-item.selected {
    background: var(--accent);
    color: #fff;
  }
  .slash-item .slash-cmd { font-weight: bold; min-width: 120px; }
  .slash-item .slash-desc { color: var(--text-dim); }
  .slash-item:hover .slash-desc, .slash-item.selected .slash-desc { color: rgba(255,255,255,0.8); }

  /* Image attach */
  #attach-btn {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 10px;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
  }
  #attach-btn:hover { color: var(--text); border-color: var(--text-dim); }
  #attach-btn:hover { color: var(--text); }
  #attach-preview {
    display: none;
    padding: 4px 16px;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }
  #attach-preview.active { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .attach-thumb {
    position: relative;
    display: inline-block;
  }
  .attach-thumb img {
    max-height: 60px;
    max-width: 120px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }
  .attach-thumb .remove {
    position: absolute;
    top: -4px;
    right: -4px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 16px;
    height: 16px;
    font-size: 10px;
    line-height: 16px;
    text-align: center;
    cursor: pointer;
    padding: 0;
  }
  .msg.user img.user-image {
    max-width: 200px;
    max-height: 150px;
    border-radius: 4px;
    border: 1px solid var(--border);
    display: block;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div id="header">
  <span class="logo">>_</span>
  <span id="session-info" class="status"></span>
  <span id="status" class="status">disconnected</span>
  <button id="theme-btn" title="Toggle theme">◑</button>
</div>

<div id="messages"></div>

<div id="attach-preview"></div>
<div id="input-area">
  <div id="slash-menu"></div>
  <span id="input-prompt">❯ </span>
  <textarea id="input" rows="1" placeholder="Message or /help" autofocus></textarea>
  <button id="attach-btn" title="Attach image (Ctrl+U)">^U</button>
  <button id="send-btn" title="Send (Enter)">↵</button>
  <input type="file" id="file-input" accept="image/*" multiple hidden>
</div>

<script>
const $ = (s) => document.querySelector(s);
const messagesEl = $('#messages');
const inputEl = $('#input');
const sendBtn = $('#send-btn');
const promptEl = $('#input-prompt');
const statusEl = $('#status');
const sessionInfoEl = $('#session-info');

function setBusy(on) {
  busy = on;
  if (on) {
    sendBtn.textContent = '^C';
    sendBtn.title = 'Cancel (Ctrl+C)';
    sendBtn.classList.add('cancel');
    promptEl.classList.add('busy');
  } else {
    sendBtn.textContent = '↵';
    sendBtn.title = 'Send (Enter)';
    sendBtn.classList.remove('cancel');
    promptEl.classList.remove('busy');
  }
}
const attachBtn = $('#attach-btn');
const fileInput = $('#file-input');
const attachPreview = $('#attach-preview');
const themeBtn = $('#theme-btn');

// --- Click-to-collapse for expanded details (thinking, tool output) ---
messagesEl.addEventListener('click', (e) => {
  const el = e.target;
  // Clicking thinking content or tool output content collapses the parent <details>
  if (el.classList.contains('thinking-content') || el.classList.contains('tc-content')) {
    const details = el.closest('details');
    if (details && details.open) {
      details.open = false;
      e.stopPropagation();
    }
  }
});

// --- Theme ---
const THEME_ICONS = { auto: '◑', light: '☀', dark: '☾' };
const THEME_CYCLE = ['auto', 'light', 'dark'];
function getTheme() { return localStorage.getItem('theme') || 'auto'; }
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  themeBtn.textContent = THEME_ICONS[t];
  themeBtn.title = `Theme: ${t}`;
  localStorage.setItem('theme', t);
}
themeBtn.onclick = () => {
  const cur = getTheme();
  applyTheme(THEME_CYCLE[(THEME_CYCLE.indexOf(cur) + 1) % 3]);
};
applyTheme(getTheme());

let ws = null;
let sessionId = null;
let sessionCwd = null;
let sessionTitle = null;
let awaitingNewSession = false;
let availableModels = [];
let currentModel = null;
let currentAssistantEl = null;
let currentAssistantText = '';
let currentThinkingEl = null;
let currentThinkingText = '';
let busy = false;
let pendingImages = []; // { data: base64, mimeType, previewUrl }

function resetSessionUI() {
  messagesEl.innerHTML = '';
  currentAssistantEl = null;
  currentAssistantText = '';
  currentThinkingEl = null;
  currentThinkingText = '';
  pendingImages = [];
  renderAttachPreview();
  setBusy(false);
}

// --- Markdown ---
marked.setOptions({ breaks: true, gfm: true });

function renderMd(text) {
  return marked.parse(text);
}

// --- Hash routing ---

function getHashSessionId() {
  const h = location.hash.slice(1);
  return h || null;
}

function setHashSessionId(id) {
  history.replaceState(null, '', `#${id}`);
}

function updateSessionInfo(id, title) {
  sessionInfoEl.textContent = title || (id ? id.slice(0, 8) + '…' : '');
  document.title = title || '>_';
}

// --- History replay ---

async function loadHistory(sid) {
  try {
    const res = await fetch(`/api/sessions/${sid}/events`);
    if (!res.ok) return false;
    const events = await res.json();
    for (let i = 0; i < events.length; i++) {
      const data = JSON.parse(events[i].data);
      replayEvent(events[i].type, data, events, i);
    }
    return true;
  } catch {
    return false;
  }
}

function replayEvent(type, data, events, idx) {
  switch (type) {
    case 'user_message': {
      const el = addMessage('user', data.text);
      if (data.images) {
        for (const img of data.images) {
          const imgEl = document.createElement('img');
          imgEl.className = 'user-image';
          imgEl.src = `/data/${img.path}`;
          el.appendChild(imgEl);
        }
      }
      break;
    }
    case 'assistant_message':
      addMessage('assistant', data.text);
      break;
    case 'thinking': {
      const el = document.createElement('details');
      el.className = 'thinking';
      el.innerHTML = `<summary>⠿ thought</summary><div class="thinking-content">${escHtml(data.text)}</div>`;
      messagesEl.appendChild(el);
      break;
    }
    case 'tool_call': {
      const icons = { read: 'cat', edit: 'edit', execute: 'exec', search: 'find', delete: 'rm' };
      const icon = icons[data.kind] || 'run';
      const el = document.createElement('div');
      el.className = 'tool-call';
      el.id = `tc-${data.id}`;
      let label = `<span class="icon">${icon}</span> ${escHtml(data.title)}`;
      const ri = data.rawInput;
      if (ri && ri.command) {
        label += `<span class="tc-detail">$ ${escHtml(ri.command)}</span>`;
      } else if (ri && ri.path) {
        label += `<span class="tc-detail">${escHtml(ri.path)}</span>`;
      }
      el.innerHTML = label;
      const diffHtml = data.kind === 'edit' ? renderPatchDiff(ri) : null;
      if (diffHtml) {
        const details = document.createElement('details');
        details.innerHTML = `<summary>diff</summary><div class="diff-view">${diffHtml}</div>`;
        el.appendChild(details);
      }
      const detail = el.querySelector('.tc-detail');
      if (detail) el.onclick = () => detail.classList.toggle('expanded');
      messagesEl.appendChild(el);
      break;
    }
    case 'tool_call_update': {
      const el = document.getElementById(`tc-${data.id}`);
      if (el) {
        const statusIcon = data.status === 'completed' ? '✓' : data.status === 'failed' ? '✗' : '…';
        el.className = `tool-call ${data.status}`;
        const iconSpan = el.querySelector('.icon');
        if (iconSpan) iconSpan.textContent = statusIcon;
      }
      break;
    }
    case 'plan': {
      const el = document.createElement('div');
      el.className = 'plan';
      el.innerHTML = '<div class="plan-title">― plan</div>' +
        (data.entries || []).map(e => {
          const s = { pending: '○', in_progress: '◉', completed: '●' }[e.status] || '?';
          return `<div class="plan-entry">${s} ${escHtml(e.content)}</div>`;
        }).join('');
      messagesEl.appendChild(el);
      break;
    }
    case 'permission_request': {
      const el = document.createElement('div');
      el.className = 'permission';
      el.dataset.requestId = data.requestId;
      el.innerHTML = `<span class="title" style="opacity:0.5">⚿ ${escHtml(data.title)}</span> `;
      // Check if this permission was already resolved later in history
      const wasResolved = events && events.slice(idx + 1).some(e =>
        e.type === 'permission_response' && JSON.parse(e.data).requestId === data.requestId
      );
      if (!wasResolved && data.options) {
        el.querySelector('.title').style.opacity = '1';
        data.options.forEach(opt => {
          const btn = document.createElement('button');
          const isAllow = (opt.kind || '').includes('allow');
          btn.className = isAllow ? 'allow' : 'deny';
          btn.textContent = opt.name;
          btn.onclick = () => {
            const isDeny = (opt.kind || '').includes('reject') || (opt.kind || '').includes('deny');
            ws.send(JSON.stringify({
              type: 'permission_response',
              sessionId,
              requestId: data.requestId,
              optionId: opt.optionId,
              optionName: opt.name,
              denied: isDeny,
            }));
            el.innerHTML = `<span style="opacity:0.5">⚿ ${escHtml(data.title)} — ${escHtml(opt.name)}</span>`;
          };
          el.appendChild(btn);
        });
      }
      messagesEl.appendChild(el);
      break;
    }
    case 'permission_response': {
      const el = document.querySelector(`.permission[data-request-id="${data.requestId}"]`);
      if (el) {
        const title = el.querySelector('.title')?.textContent || '⚿';
        const action = data.denied ? 'denied' : data.optionName || 'allowed';
        el.innerHTML = `<span style="opacity:0.5">${escHtml(title)} — ${escHtml(action)}</span>`;
      }
      break;
    }
    case 'bash_command': {
      const el = addBashBlock(data.command, false);
      // Tag it so bash_result can find the last one
      el.id = 'bash-replay-pending';
      break;
    }
    case 'bash_result': {
      const el = document.getElementById('bash-replay-pending');
      if (el) {
        el.removeAttribute('id');
        if (data.output) {
          const out = el.querySelector('.bash-output');
          out.textContent = data.output;
          out.classList.add('has-content');
        }
        finishBash(el, data.code, data.signal);
      }
      break;
    }
  }
}

// --- WebSocket ---

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  statusEl.textContent = 'connecting…';
  statusEl.className = 'status connecting';
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen = async () => {
    statusEl.textContent = 'session loading…';
    statusEl.className = 'status connecting';

    const existingId = getHashSessionId();
    if (existingId) {
      // URL has a session — load its history and resume
      const loaded = await loadHistory(existingId);
      if (loaded) {
        scrollToBottom();
      }
      ws.send(JSON.stringify({ type: 'resume_session', sessionId: existingId }));
      return;
    }

    // No session in URL — try to resume last active session
    try {
      const res = await fetch('/api/sessions');
      const sessions = await res.json();
      if (sessions.length > 0) {
        const last = sessions[0]; // sorted by last_active_at DESC
        const loaded = await loadHistory(last.id);
        if (loaded) {
          scrollToBottom();
        }
        ws.send(JSON.stringify({ type: 'resume_session', sessionId: last.id }));
        return;
      }
    } catch {}

    // No previous sessions — create new
    awaitingNewSession = true;
    ws.send(JSON.stringify({ type: 'new_session' }));
  };

  ws.onclose = () => {
    statusEl.textContent = 'disconnected';
    statusEl.className = 'status';
    finishThinking();
    finishAssistant();
    if (currentBashEl) { finishBash(currentBashEl, null, 'disconnected'); }
    setBusy(false);
    setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleEvent(msg);
  };
}

function handleEvent(msg) {
  // Ignore events from other sessions (multi-client broadcast)
  if (msg.sessionId && sessionId && msg.sessionId !== sessionId
      && msg.type !== 'session_created' && msg.type !== 'session_deleted') {
    return;
  }
  switch (msg.type) {
    case 'connected':
      break;

    case 'session_created':
      // Only switch to the new session if this client requested it
      if (!awaitingNewSession && sessionId && msg.sessionId !== sessionId) {
        break;
      }
      awaitingNewSession = false;
      sessionId = msg.sessionId;
      sessionCwd = msg.cwd || sessionCwd;
      sessionTitle = msg.title || null;
      if (msg.models) {
        availableModels = msg.models.availableModels || [];
        currentModel = msg.models.currentModelId || null;
      }
      if (msg.model && !currentModel) {
        currentModel = msg.model;
      }
      setHashSessionId(sessionId);
      updateSessionInfo(sessionId, sessionTitle);
      statusEl.textContent = 'connected';
      statusEl.className = 'status connected';
      if (messagesEl.children.length === 0) {
        addSystem(`Session created: ${sessionTitle || msg.sessionId.slice(0, 8) + '…'}`);
      }
      break;

    case 'user_message': {
      // Broadcast from another client
      if (msg.sessionId === sessionId) {
        const el = addMessage('user', msg.text);
        if (msg.images) {
          for (const img of msg.images) {
            const imgEl = document.createElement('img');
            imgEl.className = 'user-image';
            imgEl.src = `/data/${img.path}`;
            el.appendChild(imgEl);
          }
        }
      }
      break;
    }

    case 'message_chunk':
      hideWaiting();
      finishThinking();
      if (!currentAssistantEl) {
        currentAssistantEl = addMessage('assistant', '');
        currentAssistantText = '';
      }
      currentAssistantText += msg.text;
      currentAssistantEl.innerHTML = renderMd(currentAssistantText);
      scrollToBottom();
      break;

    case 'thought_chunk':
      hideWaiting();
      if (!currentThinkingEl) {
        currentThinkingEl = document.createElement('details');
        currentThinkingEl.className = 'thinking';
        currentThinkingEl.innerHTML = '<summary class="active">⠿ thinking...</summary><div class="thinking-content"></div>';
        currentThinkingText = '';
        messagesEl.appendChild(currentThinkingEl);
      }
      currentThinkingText += msg.text;
      currentThinkingEl.querySelector('.thinking-content').textContent = currentThinkingText;
      scrollToBottom();
      break;

    case 'tool_call': {
      hideWaiting();
      finishThinking();
      finishAssistant();
      const icons = { read: 'cat', edit: 'edit', execute: 'exec', search: 'find', delete: 'rm' };
      const icon = icons[msg.kind] || 'run';
      const el = document.createElement('div');
      el.className = 'tool-call';
      el.id = `tc-${msg.id}`;
      let label = `<span class="icon">${icon}</span> ${escHtml(msg.title)}`;
      const ri = msg.rawInput;
      if (ri && ri.command) {
        label += `<span class="tc-detail">$ ${escHtml(ri.command)}</span>`;
      } else if (ri && ri.path) {
        label += `<span class="tc-detail">${escHtml(ri.path)}</span>`;
      }
      el.innerHTML = label;
      // Render diff for edit tool calls
      const diffHtml = msg.kind === 'edit' ? renderPatchDiff(ri) : null;
      if (diffHtml) {
        const details = document.createElement('details');
        details.innerHTML = `<summary>diff</summary><div class="diff-view">${diffHtml}</div>`;
        el.appendChild(details);
      }
      const detail = el.querySelector('.tc-detail');
      if (detail) el.onclick = () => detail.classList.toggle('expanded');
      messagesEl.appendChild(el);
      scrollToBottom();
      break;
    }

    case 'tool_call_update': {
      const el = document.getElementById(`tc-${msg.id}`);
      if (el) {
        const statusIcon = msg.status === 'completed' ? '✓' : msg.status === 'failed' ? '✗' : '…';
        el.className = `tool-call ${msg.status}`;
        const iconSpan = el.querySelector('.icon');
        if (iconSpan) iconSpan.textContent = statusIcon;
        // Render tool output as collapsible content
        if (msg.content && msg.content.length && !el.querySelector('details')) {
          const text = msg.content
            .map(c => {
              if (c.type === 'terminal') return `[terminal ${c.terminalId}]`;
              if (c.content?.text) return c.content.text;
              if (Array.isArray(c.content)) return c.content.map(cc => cc.text || '').join('');
              return '';
            })
            .filter(Boolean).join('\n');
          if (text) {
            const details = document.createElement('details');
            details.innerHTML = `<summary>output</summary><div class="tc-content">${escHtml(text)}</div>`;
            el.appendChild(details);
          }
        }
      }
      scrollToBottom();
      break;
    }

    case 'plan': {
      finishThinking();
      finishAssistant();
      const el = document.createElement('div');
      el.className = 'plan';
      el.innerHTML = '<div class="plan-title">― plan</div>' +
        msg.entries.map(e => {
          const s = { pending: '○', in_progress: '◉', completed: '●' }[e.status] || '?';
          return `<div class="plan-entry">${s} ${escHtml(e.content)}</div>`;
        }).join('');
      messagesEl.appendChild(el);
      scrollToBottom();
      break;
    }

    case 'permission_request': {
      finishThinking();
      const permEl = document.createElement('div');
      permEl.className = 'permission';
      permEl.dataset.requestId = msg.requestId;
      permEl.innerHTML = `<span class="title">⚿ ${escHtml(msg.title)}</span> `;
      msg.options.forEach(opt => {
        const btn = document.createElement('button');
        const isAllow = (opt.kind || '').includes('allow');
        btn.className = isAllow ? 'allow' : 'deny';
        btn.textContent = opt.name;
        btn.onclick = () => {
          const isDeny = (opt.kind || '').includes('reject') || (opt.kind || '').includes('deny');
          ws.send(JSON.stringify({
            type: 'permission_response',
            sessionId,
            requestId: msg.requestId,
            optionId: opt.optionId,
            optionName: opt.name,
            denied: isDeny,
          }));
          permEl.innerHTML = `<span style="opacity:0.5">⚿ ${escHtml(msg.title)} — ${escHtml(opt.name)}</span>`;
        };
        permEl.appendChild(btn);
      });
      messagesEl.appendChild(permEl);
      scrollToBottom();
      break;
    }

    case 'permission_resolved': {
      // Another client answered the permission — dismiss our buttons
      const permTarget = document.querySelector(`.permission[data-request-id="${msg.requestId}"]`);
      if (msg.sessionId === sessionId && permTarget) {
        const titleEl = permTarget.querySelector('.title');
        const title = titleEl?.textContent || '⚿';
        const action = msg.denied ? 'denied' : msg.optionName || 'allowed';
        permTarget.innerHTML = `<span style="opacity:0.5">${escHtml(title)} — ${escHtml(action)}</span>`;
      }
      break;
    }

    case 'bash_command': {
      // From another client
      if (msg.sessionId === sessionId) {
        addBashBlock(msg.command, true);
        setBusy(true);
      }
      break;
    }

    case 'bash_output': {
      if (msg.sessionId !== sessionId) break;
      if (currentBashEl) {
        const out = currentBashEl.querySelector('.bash-output');
        if (msg.stream === 'stderr') {
          const span = document.createElement('span');
          span.className = 'stderr';
          span.textContent = msg.text;
          out.appendChild(span);
        } else {
          out.appendChild(document.createTextNode(msg.text));
        }
        out.classList.add('has-content');
        out.scrollTop = out.scrollHeight;
        scrollToBottom();
      }
      break;
    }

    case 'bash_done': {
      if (msg.sessionId !== sessionId) break;
      finishBash(currentBashEl, msg.code, msg.signal);
      if (msg.error) addSystem(`err: ${msg.error}`);
      setBusy(false);
      inputEl.focus();
      break;
    }

    case 'prompt_done':
      hideWaiting();
      finishThinking();
      finishAssistant();
      setBusy(false);
      inputEl.focus();
      break;

    case 'session_deleted':
      if (msg.sessionId === sessionId) {
        addSystem('warn: This session has been deleted.');
        inputEl.disabled = true;
        sendBtn.disabled = true;
        inputEl.placeholder = 'Session deleted';
      }
      break;

    case 'session_expired':
      resetSessionUI();
      addSystem('warn: Previous session expired, created new one.');
      awaitingNewSession = true;
      ws.send(JSON.stringify({ type: 'new_session' }));
      break;

    case 'model_set':
      currentModel = msg.modelId;
      addSystem(`ok: Model: ${msg.modelId}`);
      break;

    case 'session_title_updated':
      if (msg.sessionId === sessionId) {
        sessionTitle = msg.title;
        updateSessionInfo(sessionId, sessionTitle);
      }
      break;

    case 'error':
      hideWaiting();
      finishThinking();
      finishAssistant();
      addSystem(`err: ${msg.message}`);
      setBusy(false);
      break;
  }
}

// --- Helpers ---

function addMessage(role, text) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.innerHTML = role === 'user' ? escHtml(text) : renderMd(text);
  messagesEl.appendChild(el);
  scrollToBottom();
  return el;
}

function addSystem(text) {
  const el = document.createElement('div');
  el.className = 'system-msg';
  el.textContent = text;
  messagesEl.appendChild(el);
  scrollToBottom();
}

function finishAssistant() {
  currentAssistantEl = null;
  currentAssistantText = '';
}

function finishThinking() {
  if (currentThinkingEl) {
    const sum = currentThinkingEl.querySelector('summary');
    sum.textContent = '⠿ thought';
    sum.classList.remove('active');
    sum.style.animation = 'none';
    currentThinkingEl = null;
    currentThinkingText = '';
  }
}

let waitingEl = null;
function showWaiting() {
  hideWaiting();
  waitingEl = document.createElement('div');
  waitingEl.id = 'waiting';
  waitingEl.innerHTML = '<span class="cursor">▌</span>';
  messagesEl.appendChild(waitingEl);
  scrollToBottom();
}
function hideWaiting() {
  if (waitingEl) { waitingEl.remove(); waitingEl = null; }
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatLocalTime(utcStr) {
  if (!utcStr) return '';
  const d = new Date(utcStr.endsWith('Z') ? utcStr : utcStr + 'Z');
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function renderPatchDiff(ri) {
  // Case 1: patch string format (*** Begin Patch)
  if (typeof ri === 'string' && ri.includes('*** Begin Patch')) {
    const lines = ri.split('\n');
    const html = [];
    for (const line of lines) {
      if (line.startsWith('*** Begin Patch') || line.startsWith('*** End Patch')) continue;
      if (line.startsWith('*** Update File:') || line.startsWith('*** Add File:') || line.startsWith('*** Delete File:')) {
        html.push(`<span class="diff-file">${escHtml(line)}</span>`);
      } else if (line.startsWith('@@')) {
        html.push(`<span class="diff-hunk">${escHtml(line)}</span>`);
      } else if (line.startsWith('-')) {
        html.push(`<span class="diff-del">${escHtml(line)}</span>`);
      } else if (line.startsWith('+')) {
        html.push(`<span class="diff-add">${escHtml(line)}</span>`);
      } else {
        html.push(escHtml(line));
      }
    }
    return html.join('\n');
  }
  // Case 2: object with old_str / new_str (edit tool rawInput)
  if (ri && typeof ri === 'object') {
    const html = [];
    if (ri.path) html.push(`<span class="diff-file">*** ${escHtml(ri.path)}</span>`);
    if (ri.old_str != null) {
      for (const line of String(ri.old_str).split('\n')) {
        html.push(`<span class="diff-del">- ${escHtml(line)}</span>`);
      }
    }
    if (ri.new_str != null) {
      for (const line of String(ri.new_str).split('\n')) {
        html.push(`<span class="diff-add">+ ${escHtml(line)}</span>`);
      }
    }
    if (ri.file_text != null) {
      html.push(`<span class="diff-add">+ (new file, ${ri.file_text.split('\n').length} lines)</span>`);
    }
    return html.length > (ri.path ? 1 : 0) ? html.join('\n') : null;
  }
  return null;
}

// --- Bash command UI ---

let currentBashEl = null;

function addBashBlock(command, running = false) {
  const el = document.createElement('div');
  el.className = 'bash-block';
  el.innerHTML = `<span class="bash-cmd${running ? ' running' : ''}">${escHtml(command)}</span>` +
    `<div class="bash-output"></div>`;
  // Click command line to toggle output visibility
  el.querySelector('.bash-cmd').onclick = () => {
    const out = el.querySelector('.bash-output');
    if (out.style.display === 'none') {
      out.style.display = 'block';
    } else if (out.classList.contains('has-content')) {
      out.style.display = 'none';
    }
  };
  messagesEl.appendChild(el);
  scrollToBottom();
  if (running) currentBashEl = el;
  return el;
}

function finishBash(el, code, signal) {
  if (!el) return;
  const cmd = el.querySelector('.bash-cmd');
  cmd.classList.remove('running');
  let exitText = '';
  if (signal) {
    exitText = `[signal: ${signal}]`;
  } else if (code !== 0 && code != null) {
    exitText = `[exit: ${code}]`;
  }
  if (exitText) {
    const span = document.createElement('span');
    span.className = `bash-exit ${code === 0 ? 'ok' : 'fail'}`;
    span.textContent = exitText;
    cmd.after(span);
  }
  if (el === currentBashEl) currentBashEl = null;
}

// --- Slash commands ---

async function handleSlashCommand(text) {
  const parts = text.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const arg = parts.slice(1).join(' ').trim();

  switch (cmd) {
    case '/new': {
      resetSessionUI();
      addSystem('Creating new session…');
      const payload = { type: 'new_session', cwd: arg || sessionCwd };
      awaitingNewSession = true;
      ws.send(JSON.stringify(payload));
      return true;
    }

    case '/pwd':
      addSystem(`📁 ${sessionCwd || 'unknown'}`);
      return true;

    case '/sessions':
      addSystem('Removed. Use /switch to see all sessions.');
      return true;

    case '/delete': {
      if (!arg) {
        addSystem('Usage: /delete <title or id prefix>');
        return true;
      }
      try {
        const res = await fetch('/api/sessions');
        const sessions = await res.json();
        const query = arg.toLowerCase();
        const match = sessions.find(s =>
          s.id !== sessionId &&
          (s.id.startsWith(arg) || (s.title && s.title.toLowerCase().includes(query)))
        );
        if (!match) {
          addSystem(`err: No session matching "${arg}"`);
          return true;
        }
        ws.send(JSON.stringify({ type: 'delete_session', sessionId: match.id }));
        addSystem(`Deleted: ${match.title || match.id.slice(0, 8) + '…'}`);
      } catch {
        addSystem('err: Failed to delete session');
      }
      return true;
    }

    case '/switch': {
      if (!arg) {
        addSystem('Usage: /switch <title or id prefix>');
        return true;
      }
      try {
        const res = await fetch('/api/sessions');
        const sessions = await res.json();
        const query = arg.toLowerCase();
        const match = sessions.find(s =>
          s.id.startsWith(arg) ||
          (s.title && s.title.toLowerCase().includes(query))
        );
        if (!match) {
          addSystem(`err: No session matching "${arg}"`);
          return true;
        }
        resetSessionUI();
        await loadHistory(match.id);
        scrollToBottom();
        ws.send(JSON.stringify({ type: 'resume_session', sessionId: match.id }));
      } catch {
        addSystem('err: Failed to switch session');
      }
      return true;
    }

    case '/cancel':
      if (busy) {
        doCancel();
      } else {
        addSystem('Nothing to cancel.');
      }
      return true;

    case '/help':
      addSystem('!<command> — Run bash command');
      addSystem('/new [cwd] — New session');
      addSystem('/pwd — Show working directory');
      addSystem('/model [name] — Show or switch model');
      addSystem('/cancel — Cancel current response');
      addSystem('/switch <title|id> — Switch to session (title or id prefix match)');
      addSystem('/delete <title|id> — Delete a session');
      addSystem('/help — Show this help');
      addSystem('--- Shortcuts ---');
      addSystem('Enter — Send message');
      addSystem('Shift+Enter — New line');
      addSystem('Ctrl+C — Cancel current response');
      addSystem('Ctrl+U (^U) — Upload image');
      return true;

    case '/model': {
      if (!arg) {
        addSystem(`model: ${currentModel || 'unknown'}`);
        addSystem('Type /model + space to pick from list');
        return true;
      }
      const query = arg.trim();
      const normalize = (s) => s.toLowerCase().replace(/[\s_]+/g, '-');
      const normalizedQuery = normalize(query);
      let match = availableModels.find(m => normalize(m.modelId) === normalizedQuery);
      if (!match) {
        const matches = availableModels.filter(m => normalize(m.modelId).includes(normalizedQuery));
        if (matches.length === 1) {
          match = matches[0];
        } else if (matches.length > 1) {
          addSystem(`err: Ambiguous model "${arg}". Try /model to see available models.`);
          return true;
        }
      }
      if (!match) {
        addSystem(`err: Unknown model "${arg}". Try /model to see available models.`);
        return true;
      }
      ws.send(JSON.stringify({ type: 'set_model', sessionId, modelId: match.modelId }));
      addSystem(`model → ${match.modelId}`);
      return true;
    }

    default:
      return false;
  }
}

// --- Image attach ---

function readFileAsBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => {
      const base64 = reader.result.split(',')[1];
      resolve({ data: base64, mimeType: file.type, previewUrl: reader.result });
    };
    reader.readAsDataURL(file);
  });
}

function addPendingImage(img) {
  pendingImages.push(img);
  renderAttachPreview();
  inputEl.focus();
}

function renderAttachPreview() {
  attachPreview.innerHTML = '';
  if (pendingImages.length === 0) {
    attachPreview.classList.remove('active');
    return;
  }
  attachPreview.classList.add('active');
  pendingImages.forEach((img, i) => {
    const thumb = document.createElement('span');
    thumb.className = 'attach-thumb';
    thumb.innerHTML = `<img src="${img.previewUrl}"><button class="remove">×</button>`;
    thumb.querySelector('.remove').onclick = () => {
      pendingImages.splice(i, 1);
      renderAttachPreview();
    };
    attachPreview.appendChild(thumb);
  });
}

attachBtn.onclick = () => fileInput.click();
fileInput.onchange = async () => {
  for (const f of fileInput.files) {
    if (f.type.startsWith('image/')) addPendingImage(await readFileAsBase64(f));
  }
  fileInput.value = '';
};

// Paste images
inputEl.addEventListener('paste', async (e) => {
  for (const item of e.clipboardData.items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      addPendingImage(await readFileAsBase64(item.getAsFile()));
    }
  }
});

// --- Slash command autocomplete ---

const SLASH_COMMANDS = [
  { cmd: '/cancel',   args: '',            desc: 'Cancel current response' },
  { cmd: '/delete',   args: '<title|id>',  desc: 'Delete a session' },
  { cmd: '/help',     args: '',            desc: 'Show help' },
  { cmd: '/model',    args: '[name]',      desc: 'Pick or switch model' },
  { cmd: '/new',      args: '[cwd]',       desc: 'New session' },
  { cmd: '/pwd',      args: '',            desc: 'Show working directory' },
  { cmd: '/switch',   args: '<title|id>',  desc: 'Switch to session' },
];

const slashMenu = $('#slash-menu');
let slashIdx = -1;
let slashFiltered = [];
let slashMode = 'commands'; // 'commands', 'switch', 'delete', or 'model'
let cachedSessions = null;
let slashDismissed = null; // input value when menu was dismissed via Escape

function updateSlashMenu() {
  const text = inputEl.value;

  // If menu was dismissed and input hasn't changed, don't reopen
  if (slashDismissed !== null) {
    if (text === slashDismissed) return;
    slashDismissed = null;
  }

  // /switch or /delete — show session picker
  const switchMatch = text.match(/^\/(switch|delete) /);
  if (switchMatch && !busy) {
    const query = text.slice(switchMatch[0].length).toLowerCase();
    fetchSessionsForMenu(query, switchMatch[1]);
    return;
  }

  // /model — show model picker
  const modelMatch = text.match(/^\/model /);
  if (modelMatch && !busy) {
    const query = text.slice(modelMatch[0].length).toLowerCase();
    showModelMenu(query);
    return;
  }

  // Only match when input starts with "/" and is still on the command part (no space yet)
  if (!text.startsWith('/') || text.includes(' ') || busy) {
    hideSlashMenu();
    return;
  }
  slashMode = 'commands';
  const prefix = text.toLowerCase();
  slashFiltered = SLASH_COMMANDS.filter(c => c.cmd.startsWith(prefix));
  if (slashFiltered.length === 0) {
    hideSlashMenu();
    return;
  }
  slashIdx = 0;
  renderSlashMenu();
  slashMenu.classList.add('active');
}

async function fetchSessionsForMenu(query, mode = 'switch') {
  if (!cachedSessions) {
    try {
      const res = await fetch('/api/sessions');
      cachedSessions = await res.json();
      // Expire cache after 5s
      setTimeout(() => { cachedSessions = null; }, 5000);
    } catch { return; }
  }
  slashMode = mode;
  const items = cachedSessions
    .filter(s => {
      if (!query) return true;
      return (s.title && s.title.toLowerCase().includes(query)) || s.id.startsWith(query);
    });
  slashFiltered = items;
  if (slashFiltered.length === 0) {
    hideSlashMenu();
    return;
  }
  slashIdx = 0;
  renderSlashMenu();
  slashMenu.classList.add('active');
}

function showModelMenu(query) {
  slashMode = 'model';
  slashFiltered = availableModels.filter(m => {
    if (!query) return true;
    return m.modelId.toLowerCase().includes(query);
  });
  if (slashFiltered.length === 0) {
    hideSlashMenu();
    return;
  }
  slashIdx = 0;
  renderSlashMenu();
  slashMenu.classList.add('active');
}

function renderSlashMenu() {
  if (slashMode === 'model') {
    const current = currentModel?.toLowerCase() || '';
    slashMenu.innerHTML = slashFiltered.map((m, i) => {
      const isCurrent = m.modelId.toLowerCase() === current;
      const prefix = isCurrent ? '* ' : '  ';
      const style = isCurrent ? ' style="color:var(--green)"' : '';
      return `<div class="slash-item${i === slashIdx ? ' selected' : ''}" data-idx="${i}"><span class="slash-cmd"${style}>${escHtml(prefix + m.modelId)}</span></div>`;
    }).join('');
  } else if (slashMode === 'switch' || slashMode === 'delete') {
    slashMenu.innerHTML = slashFiltered.map((s, i) => {
      const isCurrent = s.id === sessionId;
      const prefix = isCurrent ? '* ' : '  ';
      const label = s.title || s.id.slice(0, 8) + '…';
      const time = formatLocalTime(s.last_active_at || s.created_at);
      const style = isCurrent ? ' style="color:var(--green)"' : '';
      return `<div class="slash-item${i === slashIdx ? ' selected' : ''}" data-idx="${i}"><span class="slash-cmd"${style}>${escHtml(prefix + label)}</span><span class="slash-desc">${escHtml(s.cwd)} (${escHtml(time)})</span></div>`;
    }).join('');
  } else {
    slashMenu.innerHTML = slashFiltered.map((c, i) => {
      const label = c.args ? `${c.cmd} ${c.args}` : c.cmd;
      return `<div class="slash-item${i === slashIdx ? ' selected' : ''}" data-idx="${i}"><span class="slash-cmd">${escHtml(label)}</span><span class="slash-desc">${escHtml(c.desc)}</span></div>`;
    }).join('');
  }
  const sel = slashMenu.querySelector('.selected');
  if (sel) sel.scrollIntoView({ block: 'nearest' });
}

function hideSlashMenu() {
  slashMenu.classList.remove('active');
  slashIdx = -1;
  slashFiltered = [];
  slashMode = 'commands';
  slashDismissed = inputEl.value;
}

function selectSlashItem(idx) {
  if (idx < 0 || idx >= slashFiltered.length) return;

  if (slashMode === 'model') {
    const m = slashFiltered[idx];
    inputEl.value = '';
    hideSlashMenu();
    ws.send(JSON.stringify({ type: 'set_model', sessionId, modelId: m.modelId }));
    addSystem(`model → ${m.modelId}`);
  } else if (slashMode === 'switch') {
    const s = slashFiltered[idx];
    inputEl.value = '';
    hideSlashMenu();
    resetSessionUI();
    addSystem('Switching…');
    loadHistory(s.id).then(loaded => { if (loaded) scrollToBottom(); });
    ws.send(JSON.stringify({ type: 'resume_session', sessionId: s.id }));
  } else if (slashMode === 'delete') {
    const s = slashFiltered[idx];
    inputEl.value = '';
    hideSlashMenu();
    ws.send(JSON.stringify({ type: 'delete_session', sessionId: s.id }));
    addSystem(`Deleted: ${s.title || s.id.slice(0, 8) + '…'}`);
  } else {
    const item = slashFiltered[idx];
    inputEl.value = item.cmd + (item.args ? ' ' : '');
    hideSlashMenu();
    inputEl.focus();
    // Trigger picker for /switch, /delete, and /model
    if (item.cmd === '/switch' || item.cmd === '/delete' || item.cmd === '/model') updateSlashMenu();
  }
}

slashMenu.addEventListener('mousedown', (e) => {
  // Prevent blur on input
  e.preventDefault();
  const item = e.target.closest('.slash-item');
  if (item) selectSlashItem(Number(item.dataset.idx));
});

inputEl.addEventListener('input', () => {
  updateSlashMenu();
  document.getElementById('input-area').classList.toggle('bash-mode', inputEl.value.startsWith('!'));
});

// --- Input ---

function sendMessage() {
  const text = inputEl.value.trim();
  if (!text && pendingImages.length === 0) return;
  if (busy) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  document.getElementById('input-area').classList.remove('bash-mode');

  if (text.startsWith('/') && pendingImages.length === 0) {
    handleSlashCommand(text);
    return;
  }

  // "!" bash command
  if (text.startsWith('!') && pendingImages.length === 0) {
    const command = text.slice(1).trim();
    if (!command) return;
    if (!sessionId) {
      addSystem('warn: Session not ready yet, please wait…');
      return;
    }
    addBashBlock(command, true);
    ws.send(JSON.stringify({ type: 'bash_exec', sessionId, command }));
    setBusy(true);
    return;
  }

  if (!sessionId) {
    addSystem('warn: Session not ready yet, please wait…');
    return;
  }

  // Show user message with image thumbnails
  const msgEl = addMessage('user', text || '(image)');
  for (const img of pendingImages) {
    const imgEl = document.createElement('img');
    imgEl.className = 'user-image';
    imgEl.src = img.previewUrl;
    msgEl.appendChild(imgEl);
  }

  // Upload images to server, then send prompt
  const images = pendingImages.slice();
  pendingImages = [];
  renderAttachPreview();

  if (images.length > 0) {
    Promise.all(images.map(img =>
      fetch(`/api/images/${sessionId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: img.data, mimeType: img.mimeType }),
      }).then(r => r.json()).then(j => ({ data: img.data, mimeType: img.mimeType, path: j.path }))
    )).then(uploaded => {
      ws.send(JSON.stringify({ type: 'prompt', sessionId, text: text || 'What is in this image?', images: uploaded }));
    });
  } else {
    ws.send(JSON.stringify({ type: 'prompt', sessionId, text }));
  }
  setBusy(true);
  showWaiting();
}

function doCancel() {
  if (busy && ws) {
    if (currentBashEl) {
      ws.send(JSON.stringify({ type: 'bash_cancel', sessionId }));
    } else {
      ws.send(JSON.stringify({ type: 'cancel', sessionId }));
    }
    addSystem('^C');
  }
}

sendBtn.onclick = () => busy ? doCancel() : sendMessage();
inputEl.addEventListener('keydown', (e) => {
  // Slash menu navigation
  if (slashMenu.classList.contains('active')) {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      slashIdx = (slashIdx + 1) % slashFiltered.length;
      renderSlashMenu();
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      slashIdx = (slashIdx - 1 + slashFiltered.length) % slashFiltered.length;
      renderSlashMenu();
      return;
    }
    if (e.key === 'Tab') {
      e.preventDefault();
      selectSlashItem(slashIdx);
      return;
    }
    if (e.key === 'Escape') {
      e.preventDefault();
      hideSlashMenu();
      return;
    }
  }
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    hideSlashMenu();
    if (!busy) {
      sendMessage();
    }
    return;
  }
  // Ctrl+C to cancel
  if (e.key === 'c' && (e.ctrlKey || e.metaKey) && !e.shiftKey) {
    if (busy) {
      e.preventDefault();
      doCancel();
      return;
    }
  }
  // Ctrl+U to upload file
  if (e.key === 'u' && (e.ctrlKey || e.metaKey) && !e.shiftKey) {
    e.preventDefault();
    fileInput.click();
    return;
  }
});

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
});

// --- Boot ---
connect();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
